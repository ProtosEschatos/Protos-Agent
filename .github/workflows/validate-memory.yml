name: Validate memory

on:
  push:
    paths:
      - 'memory/**'
      - '.github/workflows/validate-memory.yml'
  pull_request:
    paths:
      - 'memory/**'
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run memory validator
        run: node memory/scripts/validate.mjs
